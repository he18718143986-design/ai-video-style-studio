
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              studio: {
                base: '#050505',    // Deepest black/gray (Main BG)
                panel: '#09090b',   // Secondary background (Sidebars, Cards)
                elevated: '#18181b',// Hover states, Modals
                border: '#27272a',  // Subtle borders
                text: {
                  primary: '#e4e4e7',   // High contrast text (Zinc-200)
                  secondary: '#a1a1aa', // Metadata text (Zinc-400)
                  muted: '#71717a',     // Disabled/Subtle text (Zinc-500)
                }
              },
              status: {
                 success: '#10b981', // Emerald
                 warning: '#f59e0b', // Amber
                 error: '#ef4444',   // Crimson
                 info: '#3b82f6'     // Blue
              },
              accent: {
                DEFAULT: '#8b5cf6', // Violet
                hover: '#7c3aed',
                dim: 'rgba(139,92,246,0.1)',
                glow: 'rgba(139,92,246,0.5)'
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Roboto Slab', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
              script: ['Courier Prime', 'monospace'],
            },
            fontSize: {
              '3xs': ['9px', '12px'],  // Tiny labels (Tags)
              '2xs': ['10px', '14px'], // Metadata
              'xs': ['12px', '16px'],  // Standard UI Labels
              'sm': ['14px', '20px'],  // Body text
              'base': ['16px', '24px'],// Headers
            },
            backgroundImage: {
              'dot-grid': 'radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px)',
              'graph-paper': 'linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px)',
              'film-strip': "linear-gradient(to right, #000 4px, transparent 4px), linear-gradient(to bottom, transparent 2px, #000 2px, #000 12px, transparent 12px)",
              'scanlines': 'linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06))',
              'noise': "url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22 opacity=%220.05%22/%3E%3C/svg%3E')"
            },
            backgroundSize: {
              'graph-size': '20px 20px',
              'scanline-size': '100% 2px, 3px 100%'
            },
            animation: {
              'progress-indeterminate': 'progress-indeterminate 1.5s infinite linear',
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'blink': 'blink 1s step-end infinite',
            },
            keyframes: {
              'progress-indeterminate': {
                '0%': { transform: 'translateX(-100%) scaleX(0.2)' },
                '50%': { transform: 'translateX(0%) scaleX(0.5)' },
                '100%': { transform: 'translateX(100%) scaleX(0.2)' },
              },
              'blink': {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0' },
              }
            }
          },
        },
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&family=Courier+Prime:wght@400;700&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #050505; /* studio-base */
        color: #e4e4e7; /* studio-text-primary */
        overflow: hidden; /* App-like feel */
      }
      /* Custom Scrollbar - Slim & Industrial */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #09090b; 
      }
      ::-webkit-scrollbar-thumb {
        background: #27272a; 
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3f3f46; 
      }
      /* Caret for Typewriter Mode */
      .caret-block {
        caret-color: #8b5cf6;
      }
      
      /* Utilities */
      .text-xxs {
        font-size: 0.65rem;
        line-height: 1rem;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
    "vite": "https://esm.sh/vite@^7.3.1",
    "path": "https://esm.sh/path@^0.12.7",
    "url": "https://esm.sh/url@^0.11.4"
  }
}
</script>

</head>

</html>
